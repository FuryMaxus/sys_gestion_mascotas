services:
  mysql:
    image: 'mysql:latest'
    environment:
      - MYSQL_DATABASE=${DB_NAME}
      - MYSQL_USER=${DB_USER}
      - MYSQL_PASSWORD=${DB_PASSWORD}
      - MYSQL_ROOT_PASSWORD=${DB_ROOT_PASSWORD}
    ports:
      - '${DB_PORT}'
  app:
    build: .
    ports:
      - '${APP_PORT}:${APP_PORT}'
    depends_on:
      - mysql
    profiles:
      - "full"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:${DB_PORT}/${DB_NAME}
      - SPRING_DATASOURCE_USERNAME=${DB_USER}
      - SPRING_DATASOURCE _PASSWORD=${DB_PASSWORD}
      - SERVER_PORT=${APP_PORT}
      - JWT_SECRET=${JWT_SECRET}
      - SPRING_JPA_HIBERNATE_DDL_AUTO=${DB_DDL_STRATEGY}